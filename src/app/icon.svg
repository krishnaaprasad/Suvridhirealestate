<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>
    <linearGradient id="green-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#166534" />
      <stop offset="100%" stop-color="#22c55e" />
    </linearGradient>
    <filter id="shadow" dx="0" dy="8" stdDeviation="12">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>
  
  <!-- Premium White Background with soft rounded edges -->
  <rect width="512" height="512" rx="112" fill="#ffffff" />
  
  <g filter="url(#shadow)">
    <!-- Base House/Building symbol (Green for Prosperity Terra/Bhoomi) -->
    <path d="M256 128 L416 256 L368 256 L368 400 L288 400 L288 304 L224 304 L224 400 L144 400 L144 256 L96 256 Z" fill="url(#green-grad)" />
    
    <!-- Bold Gold Roof/Shield (Suvridhi representing Premium investment) -->
    <path d="M256 96 L448 248 L384 248 L256 148 L128 248 L64 248 Z" fill="url(#gold-grad)" />
    
    <!-- Central Monogram S for Suvridhi -->
    <path d="M280 200 C280 185 265 180 256 180 C240 180 232 188 232 200 C232 220 280 215 280 240 C280 260 265 264 256 264 C240 264 232 258 232 245" fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round" />
  </g>
</svg>
